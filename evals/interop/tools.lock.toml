# tools.lock.toml — pinned tool identities for a reproducible Level-1 run.
#
# doctor.py reads this and verifies each REQUIRED tool is present at the pinned
# version before a lane that needs it runs. `--strict rtk codegraph` fails
# non-zero on any mismatch. Nothing here says "unset": a tool is either pinned
# and validated, or explicitly `kind = "unsupported"` with a reason — never a
# lane pretending to wait for install.
#
# Binary resolution is by <NAME>_BIN env var, then PATH. Versions (not machine
# paths) are what pin reproducibility; paths differ per environment.

[tools.qodec]
kind = "built"
build = "cargo build --release"
# The crate has no --version flag; identity is the binary's content hash,
# recorded per-run in the receipt (qodec.version()).
encode = "qodec encode --json --passthrough-on-no-gain --codec squeeze --meter o200k"
decode = "qodec decode"

[tools.rtk]
kind = "cli"
bin = "rtk"
version = "0.42.4"
version_cmd = ["--version"]
version_re = 'rtk (\S+)'
# Two real modes (probed 2026-07-12): a stdin filter (`rtk log` reads piped
# output) and command-runners that proxy a native tool (`rtk rg PATTERN PATH`
# runs rg, then filters). There is NO `rtk pipe --filter` — the earlier design
# note was wrong; the harness uses the interface RTK actually ships.
stdin_filters = ["log"]
smoke = "printf 'ERROR x\\nERROR x\\n' | rtk log"

[tools.codegraph]
kind = "cli"
bin = "codegraph"
version = "1.4.1"
version_cmd = ["--version"]
version_re = '(\S+)'
# `codegraph init` builds .codegraph/ (full graph, one step). `status --json`
# reports index.state and pendingChanges; `explore <query> -p <repo>` answers.
# 100% local, no API keys, no network at query time (verified: clap indexed in
# ~9s offline).
smoke = "codegraph status <repo> --json"

[tools.headroom]
kind = "unsupported"
reason = "adapter used an unverified return contract and side-effect flags; not validated. Do not run it as a lane."

[tools.fastcontext]
kind = "unsupported"
reason = "FastContext is a served model (OpenAI-compatible endpoint), not a `fastcontext.brief()` Python package. The earlier adapter was wrong."

[tools.graphify]
kind = "unsupported"
reason = "not yet integrated — the Graphify lane is a later increment (this one covers RTK + CodeGraph only)."
