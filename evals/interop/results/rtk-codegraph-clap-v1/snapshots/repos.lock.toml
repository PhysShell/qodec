# repos.lock.toml — corpus repos pinned by exact commit for the tool lanes.
#
# A reproducible run pins every repo it touches to a SHA (a floating branch
# makes two runs incomparable). Only repos actually used by a manifest appear
# here, each with a real `rev`; doctor.py verifies the managed clone's HEAD ==
# rev before a codegraph/graphify lane runs. The bench clones into
# `.cache/repos/<id>` (gitignored) via `manage.py`.

[repos.clap]
url = "https://github.com/clap-rs/clap"
tag = "v4.5.61"
rev = "8b41d0b8497ccaa0fb0d1d8a51f91ea2f62b3aa8"
lang = "rust"
# CodeGraph's public corpus repo; the architectural question it ships with.
question = "How does clap parse arguments against a derived command definition?"

# Future selection (NOT pinned, NOT part of any current run — do not reference
# from a manifest until pinned here with a real rev):
#   tokio, django, serilog   (rest of CodeGraph's neutral corpus)
#   excalidraw, gin, okhttp, alamofire, vscode  (CodeGraph e2e benchmark)
#   erpnext                  (Graphify home-field)
# Own.NET / OwnAudit / 007 come after, with gold tasks from already-fixed PRs.
