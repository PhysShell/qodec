name: qodec-n2e-coreutils-qualification

# CANONICAL qualification acceptance for the resolved replacement uutils/coreutils-6731
# (rust 1.81.0), executed through the already-FROZEN P1-P3 chain. This workflow does NOT decide
# PASS: the producer probe (probe_coreutils_qualification.py) records OBSERVATIONS ONLY, and the
# independent qualification verifier (verify_coreutils_qualification.py) re-derives the verdict
# from the fresh captured streams. A green job conclusion is NOT the qualification PASS -- the
# verifier's exit code is. No step commits records back to the branch, and no step flips a
# promotion flag: the standalone predicate carrier is built + frozen locally afterwards from the
# downloaded artifact. Manual-only; the disposable trigger branch
# (ci-trigger/n2e-coreutils-qualification-<shortI>) carries an ADDITIVE push stanza and every job
# checks out the implementation commit I = HEAD~1.
on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  N2E: evals/interop/v2/n2/e-rtk-native-corpus
  RTK_SHA: "41f316adf7b30a568208a0a4f824bffb266ecb6d01bd9de81bed58e1d469dfcf"

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      impl: ${{ steps.i.outputs.impl }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: i
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q 'ci-trigger/'; then
            impl="$(git rev-parse HEAD~1)"
          else
            impl="${{ github.sha }}"
          fi
          echo "impl=$impl" >> "$GITHUB_OUTPUT"
          echo "implementation commit I = $impl"

  verify:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Close the frozen P1-P3 resolved closure (fail-closed loader) BEFORE running the test
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_publisher_registry.py
          python3 tools/verify_n2e_execution_contract.py
          python3 tools/verify_n2e_resolved_membership.py
          python3 - <<'PY'
          import sys; sys.path.insert(0, "tools")
          import n2e_resolved_loader as L
          cl = L.validate_resolved_closure()
          ov = cl["overlays"]
          for k in ("dependency_snapshot", "toolchain_binary_identity", "rtk_rust_cargo_dialect"):
              assert k in ov, f"P1-P3 overlay missing from closure: {k}"
          # the qualification predicate is HELD until this run produces the record
          print("closure OK; coreutils_qualification_pass (pre-run) =",
                cl["coreutils_qualification_pass"])
          PY

  substrate:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true
      - name: Build + export pinned RTK/QODEC closures; assert RTK identity
        run: |
          nix build .#rtk-pinned .#qodec -L --no-update-lock-file
          RTK="$(nix path-info .#rtk-pinned)"
          QODEC="$(nix path-info .#qodec)"
          SHA="$(sha256sum "$RTK/bin/rtk" | cut -d' ' -f1)"
          echo "rtk sha256=$SHA"; test "$SHA" = "$RTK_SHA"
          mkdir -p substrate
          echo "$RTK"   > substrate/rtk.storepath
          echo "$QODEC" > substrate/qodec.storepath
          nix-store --query --requisites "$RTK" "$QODEC" > substrate/closure-paths.txt
          nix-store --export $(cat substrate/closure-paths.txt) | zstd -T0 -19 > substrate/closure.nar.zst
          sha256sum substrate/closure.nar.zst > substrate/closure.nar.zst.sha256
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        with:
          name: coreutils-qual-substrate
          path: substrate
          if-no-files-found: error
          retention-days: 3

  qualification:
    runs-on: ubuntu-24.04
    needs: [resolve, verify, substrate]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coreutils-qual-substrate
          path: substrate
      - name: Import + verify RTK/QODEC closure identity
        run: |
          sha="$(cut -d' ' -f1 substrate/closure.nar.zst.sha256)"
          test "$sha" = "$(sha256sum substrate/closure.nar.zst | cut -d' ' -f1)"
          zstd -d -c substrate/closure.nar.zst | nix-store --import
          RTK="$(cat substrate/rtk.storepath)/bin/rtk"
          QODEC="$(cat substrate/qodec.storepath)/bin/qodec"
          test "$(sha256sum "$RTK" | cut -d' ' -f1)" = "$RTK_SHA"
          "$RTK" --version >/dev/null
          echo "RTK_BIN=$RTK" >> "$GITHUB_ENV"
          echo "QODEC_BIN=$QODEC" >> "$GITHUB_ENV"
      - name: rustup present (probe installs the exact 1.81.0 through the frozen chain)
        run: |
          rustup --version
          rustc --version || true
      # producer records OBSERVATIONS ONLY -> build external manifest -> UPLOAD (always) -> verifier GATE
      - name: Run the Coreutils qualification acceptance probe (observations only; no verdict)
        run: |
          cd "$N2E"
          mkdir -p out
          python3 tools/probe_coreutils_qualification.py \
            --out coreutils-6731-qualification-v1.json \
            --evidence out/evidence/coreutils-6731-qual
          echo "=== outcome ==="
          python3 -c "import json;d=json.load(open('coreutils-6731-qualification-v1.json'));print('outcome=',d.get('outcome'),'qualification_pass=',d.get('qualification_pass'),'acceptance_pass=',d.get('acceptance_pass'))"
      - name: Build EXTERNAL artifact manifest (path/bytes/sha256 of every uploaded file)
        if: always()
        run: |
          cd "$N2E"
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          man_path = Path("out/external-artifact-manifest.json")
          files = [Path("coreutils-6731-qualification-v1.json")]
          for f in sorted(Path("out").rglob("*")):
              if f.is_file() and f != man_path:
                  files.append(f)
          entries = []
          for f in files:
              b = f.read_bytes()
              entries.append({"file": str(f), "bytes": len(b), "sha256": hashlib.sha256(b).hexdigest()})
          man_path.write_text(json.dumps({"count": len(entries), "files": entries}, indent=1, sort_keys=True))
          print("external manifest:", len(entries), "files")
          PY
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        if: always()
        with:
          name: coreutils-qualification
          path: |
            ${{ env.N2E }}/coreutils-6731-qualification-v1.json
            ${{ env.N2E }}/out
          if-no-files-found: error
          retention-days: 30
      - name: Independent qualification verifier (GATE; the SOLE PASS authority; runs AFTER upload)
        run: |
          cd "$N2E"
          python3 tools/verify_coreutils_qualification.py \
            coreutils-6731-qualification-v1.json out/evidence/coreutils-6731-qual
