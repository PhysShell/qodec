# Scope N2-D1b — repository-miner raw-input capture (stage 1: five-ecosystem
# pilot, now fully green across CI runs #1-4; stage 2: the full 9-case x
# capture-a/capture-b matrix below). See
# qodec/evals/interop/v2/n2/d1-identity-lock/.
#
# Never reacquires source from upstream: every case's source.tar comes from
# the already-durable, already-verified n2d0-durable-evidence-v1 release
# (Scope N2-D0), downloaded via its public github.com/.../releases/download/
# URL. Trusted dependency realization (network allowed) and the actual
# Sandboy-confined capture (network denied) are separate steps, exactly as
# for N2-A's canary. Landlock-confined execution requires a real kernel
# feature this session's own sandbox does not expose to the guest — that is
# exactly why this runs here, in a real GitHub Actions VM, rather than
# locally.
#
# Stage-1 re-run history: CI run #1 (29417042823) hit two real path bugs
# (double case-id nesting; source.tar never extracted before trusted setup).
# CI run #2 (29417313334) hit four more: repo-pyflakes's erratum lookup was
# broken by a caller-side argv0 pre-substitution (stale-erratum refusal); no
# dotnet entry existed in ECOSYSTEM_POLICY_HINTS; the gradle toolchain probe
# ran './gradlew' with no cwd; and 'mvn --version' returned ANSI-colored text
# that broke the version regex. CI run #3 (29418081991) got 8/10 green and
# found two more: this runner's installed Gradle 9.4.1 replaced the old
# '^JVM:' --version line with 'Launcher JVM:'/'Daemon JVM:'; and the
# sandboxed dotnet test capture succeeded but receipt assembly crashed with
# "unhashable type: 'dict'" (sanitizer.sanitize's rules_applied is a list of
# {"rule":...,"replacements":...} dicts, not plain strings). CI run #4
# (29418422603) was the first fully green 10/10 stage-1 run. See
# tools/generic_capture.py, tools/generic_sandbox_policy.py,
# tools/ecosystem_toolchain.py, tools/run_pilot_case.py.
#
# Stage 2 adds repo-rustlings, repo-moshi, repo-requests (already-proven
# ecosystems), and repo-dockerfile-parser-rs -- whose frozen acquisition has
# no committed Cargo.lock, so a dedicated lockfile-generation job (below)
# runs `cargo generate-lockfile` exactly ONCE and publishes it as an
# immutable artifact both its capture-a and capture-b jobs consume via
# `cargo fetch --locked`, never regenerating it per-capture.
#
# Stage-2 CI run #5 (29419265690, commit 1555a27) was fully green on the
# first try: all 19 jobs (the lockfile job plus all 9 cases x capture-a/
# capture-b) succeeded, including repo-requests' pytest-httpbin
# loopback-network tests and repo-moshi's multi-module gradlew resolution --
# no new bugs found. A subsequent commit (0121553) added a defensive
# pre-flight check (verify_relative_argv0_exists in generic_capture.py) so
# that a relative wrapper argv0 (e.g. ./gradlew) missing at the confined
# build's cwd fails with a clear diagnostic rather than an opaque sandbox
# error -- this addresses the real risk that repo-moshi's manifest names
# project.entry_point "moshi" even though its gradlew wrapper (and the
# frozen argv's cwd) is the repository root, not a moshi/ subdirectory.
#
# REVOKED (commit 87c303a): real inspection of run #6's actual captured
# bytes -- not just receipt schema and job conclusion -- found all 18
# captures were infrastructure/sandbox failures, not genuine workload
# output (see capture-content-audit-run6.json). A fail-closed
# content-acceptance gate (tools/content_acceptance.py) plus fixes for all
# four root causes (missing /dev/null, missing Python venv exposure,
# rustup default-toolchain resolution, missing dotnet trusted restore) were
# added in commit 260b4af. Per the required re-run discipline, the matrix
# below is scoped back down to the original 5 pilot cases ONLY until a
# genuinely content-valid pilot run is confirmed by inspecting the actual
# artifact bytes -- not reusing any raw input from runs #4-#6. The full
# 9-case matrix is restored, and run twice, only after that.
#
# CI run #7 (commit a497f98) real-artifact inspection found those four
# fixes did NOT resolve rust/python (identical errors) and surfaced two new
# ones (maven, gradle). Root cause for rust+python: run_confined_build.sh's
# `sudo --preserve-env=` list was hardcoded to N2-A's dotnet-only names,
# silently stripping RUSTUP_TOOLCHAIN/VIRTUAL_ENV before Sandboy's own
# env_allow ever saw them -- fixed by generalizing that list (canary
# tooling change) to the union of every ecosystem's env_allow. Python also
# had a second, independent bug: venv_root was computed with .resolve(),
# which follows the venv's bin/python symlink to the base interpreter and
# silently derives the wrong root -- fixed by dropping .resolve(). New:
# maven's ~/.m2/repository (populated during trusted setup against the
# real runner $HOME) was never exposed to the confined process's isolated
# HOME -- fixed via an explicit MAVEN_OPTS -Dmaven.repo.local plus a
# dedicated fs_rw policy entry. gradle's daemon failed to bind its own
# client<->daemon TCP loopback port under Sandboy's (correctly) fully
# closed tcp_bind policy -- fixed by disabling the daemon via GRADLE_OPTS
# (frozen ./gradlew argv unchanged). dotnet/repo-kubeops-generator hit the
# specific, pre-anticipated stop condition: the unchanged frozen `dotnet
# test` argv still attempts its own implicit restore under network denial
# even after a successful trusted restore -- left unresolved pending a
# user decision (no argv change, no confinement loosening applied).
#
# CI run #8 (commit 72038d9) confirmed the preserve-env fix worked -- no
# more rustup/venv infra-failure signatures at all -- and surfaced the real
# NEXT layer for each: rust's linker failed with "Cannot create temporary
# file in /tmp/: Permission denied" (fixed: /tmp fs_rw, same class as
# dotnet's earlier /tmp/.dotnet/shm finding); pyflakes ran genuinely
# cleanly (exit 0, no infra signature) with zero violations -- this is the
# pre-documented "genuinely empty pyflakes result" stop condition, not a
# bug, and is NOT being routed around. maven's ~/.m2 fix worked but hit a
# second real issue: this project's own pom.xml writes "dependency.tree"
# directly into the (read-only) project root (fixed: pre-touch + grant
# fs_rw to that exact file). gradle's first daemon-disable attempt
# (GRADLE_OPTS) backfired -- Gradle forked a fresh single-use daemon
# instead of skipping it -- fixed via gradle.properties under
# GRADLE_USER_HOME instead, the documented mechanism.
#
# CI run #9 (commit cf89173): rust is now genuinely content-valid --
# real "hyperfine 1.20.0" output, accepted=true, confirmed by downloading
# and inspecting canonical-raw-input.bin directly (not just job
# conclusion). maven's dependency.tree fix worked; a real, DIFFERENT
# gap followed: dependency:go-offline never resolves scala-maven-plugin's
# own lazily-fetched compiler-bridge sources jar, so the confined
# (network-denied) run failed on that specific artifact -- fixed by
# priming ~/.m2 with a real (network-allowed) `mvn test` during trusted
# setup, discarding its output; the confined run remains the sole
# authoritative capture. gradle's gradle.properties fix did NOT work
# either -- IDENTICAL "single-use Daemon process will be forked" message.
# Root cause: Sandboy's tcp_bind is a Vec<u16> of specific ports (Landlock
# scopes ports, not addresses -- see sandboy's own README), but Gradle's
# daemon binds an OS-chosen ephemeral port with no documented way to pin
# it. There is no small, correct port allowlist to add. This is a THIRD
# stop condition (alongside pyflakes' empty-result and dotnet's implicit-
# restore) requiring a user decision -- not resolved automatically.
#
# CI run #10 (commit e855002): maven's mvn-test priming worked -- the
# compiler-bridge is now genuinely cached -- but scala-maven-plugin then
# unpacks it via a hardcoded /tmp path ("AccessDeniedException: /tmp/
# scala-maven-plugin-compiler-bridge-sources..."), the exact same class of
# gap as rust's linker and dotnet's /tmp/.dotnet/shm findings -- fixed by
# the same /tmp fs_rw grant, now added for jvm-maven too.
#
# Side note (not part of this scope): this push, like every push touching
# qodec/evals/interop/v2/n2/canary/**, also re-triggers N2-A's own frozen
# canary workflow via its pull_request path filter (run 29426023565). It
# failed on captured_twice_reproducibly -- every compared field matched
# byte-for-byte (argv, environment_allowlist, canonical_policy_sha256,
# dotnet identity, exit_code) EXCEPT sanitized_stdout_sha256, i.e. the
# dotnet build's own raw stdout genuinely differed between two runs. This
# is unrelated to the PRESERVE_ENV/run_confined_build.sh change (every
# env/argv/policy field was identical) and is out of scope for N2-D1b --
# N2-A is frozen and already merged. Reported to the user, not touched.
name: qodec-n2d1b-miner-pilot

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/qodec-benchmark-v2-n2d-identity-lock
    paths:
      - ".github/workflows/qodec-n2d1b-miner-pilot.yml"

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  SANDBOY_COMMIT_SHA: e925058ddea405b5821fc0aed4882c76650dcbe9
  N2D0_RELEASE_TAG: n2d0-durable-evidence-v1

jobs:
  # Runs exactly ONCE, before the matrix, for the one case whose frozen
  # acquisition has no committed Cargo.lock. Publishes the generated
  # lockfile as an immutable artifact; both of that case's capture jobs
  # download and consume the SAME file (never regenerate their own).
  dockerfile-parser-rs-lockfile:
    name: dockerfile-parser-rs-lockfile
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 007
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Download the durable n2c-acquisition source asset (never reacquired from upstream)
        run: |
          mkdir -p "$RUNNER_TEMP/dfpr-lockfile"
          curl -sSL -o "$RUNNER_TEMP/dfpr-lockfile/acquisition.zip" \
            "https://github.com/PhysShell/007/releases/download/${N2D0_RELEASE_TAG}/n2c-acquisition-repo-dockerfile-parser-rs.zip"
          python3 -c "
          import zipfile
          with zipfile.ZipFile('$RUNNER_TEMP/dfpr-lockfile/acquisition.zip') as zf:
              zf.extractall('$RUNNER_TEMP/dfpr-lockfile')
          "
          mkdir -p "$RUNNER_TEMP/dfpr-lockfile/source"
          tar -xf "$RUNNER_TEMP/dfpr-lockfile/repo-dockerfile-parser-rs/source.tar" -C "$RUNNER_TEMP/dfpr-lockfile/source"

      - name: Generate Cargo.lock exactly once (trusted; network allowed)
        working-directory: ${{ runner.temp }}/dfpr-lockfile/source
        run: |
          if [ -f Cargo.lock ]; then
            echo "::error::repo-dockerfile-parser-rs's frozen source already has a Cargo.lock -- the dedicated lockfile job is unnecessary; investigate before proceeding."
            exit 1
          fi
          cargo generate-lockfile
          cargo --version > "$RUNNER_TEMP/dfpr-lockfile/cargo-version.txt"
          rustc --version --verbose >> "$RUNNER_TEMP/dfpr-lockfile/cargo-version.txt"
          sha256sum Cargo.lock | cut -d' ' -f1 > "$RUNNER_TEMP/dfpr-lockfile/cargo-lock.sha256"
          cp Cargo.lock "$RUNNER_TEMP/dfpr-lockfile/Cargo.lock"

      - name: Upload n2d1b-dockerfile-parser-rs-lockfile
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: n2d1b-dockerfile-parser-rs-lockfile
          path: |
            ${{ runner.temp }}/dfpr-lockfile/Cargo.lock
            ${{ runner.temp }}/dfpr-lockfile/cargo-lock.sha256
            ${{ runner.temp }}/dfpr-lockfile/cargo-version.txt
          if-no-files-found: error
          retention-days: 90

  pilot:
    name: pilot-${{ matrix.case.case_id }}-${{ matrix.job }}
    needs: [dockerfile-parser-rs-lockfile]
    strategy:
      fail-fast: false
      matrix:
        # Scoped back down to the original 5 pilot cases only, per the
        # required re-run discipline after the Stage 1/2 revocation -- see
        # the REVOKED note above. Re-expand to the full 9-case set (the
        # commented-out entries below) only after this 5-case run passes
        # real content-level acceptance, inspected at the byte level.
        case:
          - { case_id: repo-hyperfine, ecosystem: rust }
          - { case_id: repo-docker-java-parser, ecosystem: jvm-maven }
          - { case_id: repo-kubeops-generator, ecosystem: dotnet }
          - { case_id: repo-pyflakes, ecosystem: python }
          - { case_id: repo-spotless, ecosystem: jvm-gradle }
          # - { case_id: repo-rustlings, ecosystem: rust }
          # - { case_id: repo-dockerfile-parser-rs, ecosystem: rust }
          # - { case_id: repo-requests, ecosystem: python }
          # - { case_id: repo-moshi, ecosystem: jvm-gradle }
        job: [capture-a, capture-b]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 007
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Checkout Own.NET/sandboy at the accepted S0 commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: PhysShell/Own.NET
          ref: e925058ddea405b5821fc0aed4882c76650dcbe9
          path: own-net
          persist-credentials: false
          fetch-depth: 1
          sparse-checkout: |
            sandboy
          sparse-checkout-cone-mode: true

      - name: Build the accepted Sandboy commit (release, locked)
        working-directory: own-net/sandboy
        run: cargo build --release --locked

      - name: Verify Sandboy commit identity
        working-directory: own-net
        run: |
          actual=$(git rev-parse HEAD)
          if [ "$actual" != "$SANDBOY_COMMIT_SHA" ]; then
            echo "::error::checked-out Sandboy HEAD $actual != accepted $SANDBOY_COMMIT_SHA"
            exit 1
          fi

      - name: Download the durable n2c-acquisition source asset (never reacquired from upstream)
        run: |
          mkdir -p "$RUNNER_TEMP/source-artifact"
          curl -sSL -o "$RUNNER_TEMP/source-artifact/acquisition.zip" \
            "https://github.com/PhysShell/007/releases/download/${N2D0_RELEASE_TAG}/n2c-acquisition-${{ matrix.case.case_id }}.zip"
          python3 -c "
          import zipfile
          with zipfile.ZipFile('$RUNNER_TEMP/source-artifact/acquisition.zip') as zf:
              zf.extractall('$RUNNER_TEMP/source-artifact')
          "
          find "$RUNNER_TEMP/source-artifact" -maxdepth 2

      # A scratch extraction for the trusted-setup steps below only. The confined
      # run's own verify+extract, inside generic_capture.py, always re-extracts
      # fresh from the pristine source.tar for the actual capture -- these two
      # extractions are intentionally independent.
      - name: Extract source.tar for trusted-setup steps
        run: |
          mkdir -p "$RUNNER_TEMP/source-artifact/${{ matrix.case.case_id }}/source"
          tar -xf "$RUNNER_TEMP/source-artifact/${{ matrix.case.case_id }}/source.tar" \
            -C "$RUNNER_TEMP/source-artifact/${{ matrix.case.case_id }}/source"

      # ---- ecosystem toolchain setup (trusted; network allowed here) ----
      - name: Install Rust toolchain
        if: matrix.case.ecosystem == 'rust'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install JDK 11 (repo-docker-java-parser needs it; JDK 21 fails to compile its Scala plugin)
        if: matrix.case.ecosystem == 'jvm-maven'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends openjdk-11-jdk-headless maven
          echo "JAVA_HOME_11=/usr/lib/jvm/java-11-openjdk-amd64" >> "$GITHUB_ENV"

      - name: Install JDK 21 + Gradle for the gradle ecosystem
        if: matrix.case.ecosystem == 'jvm-gradle'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends openjdk-21-jdk-headless
          echo "JAVA_HOME_21=/usr/lib/jvm/java-21-openjdk-amd64" >> "$GITHUB_ENV"

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        if: matrix.case.ecosystem == 'dotnet'
        with:
          dotnet-version: "10.0.x"

      - name: Confirm python3 (runner-preinstalled; repo-pyflakes uses the authorized erratum argv)
        if: matrix.case.ecosystem == 'python'
        run: python3 --version

      # ---- repo-dockerfile-parser-rs only: fetch the ONE published lockfile ----
      - name: Download the published Cargo.lock (repo-dockerfile-parser-rs only)
        if: matrix.case.case_id == 'repo-dockerfile-parser-rs'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: n2d1b-dockerfile-parser-rs-lockfile
          path: ${{ runner.temp }}/dfpr-published-lockfile

      # ---- trusted dependency realization (network allowed; case-specific) ----
      - name: Trusted setup — cargo fetch
        if: matrix.case.ecosystem == 'rust'
        working-directory: ${{ runner.temp }}/source-artifact/${{ matrix.case.case_id }}/source
        run: |
          if [ "${{ matrix.case.case_id }}" = "repo-dockerfile-parser-rs" ]; then
            # Consume the ONE published lockfile -- never regenerate it here.
            cp "$RUNNER_TEMP/dfpr-published-lockfile/Cargo.lock" Cargo.lock
          elif [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
            echo "generated Cargo.lock sha256: $(sha256sum Cargo.lock | cut -d' ' -f1)"
          fi
          cargo fetch --locked

      - name: Trusted setup — mvn dependency:go-offline (JDK 11)
        if: matrix.case.ecosystem == 'jvm-maven'
        working-directory: ${{ runner.temp }}/source-artifact/${{ matrix.case.case_id }}/source
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
        run: |
          mvn -B dependency:go-offline || true # some poms have no go-offline-resolvable deps
          # A real capture (CI run #9) showed dependency:go-offline alone
          # doesn't cover artifacts plugins resolve lazily at their own
          # execution time -- scala-maven-plugin fetches its own
          # compiler-bridge (org.scala-sbt:compiler-bridge_2.13:sources)
          # only when actually invoked, never during dependency:go-offline.
          # Prime the real ~/.m2 by running the real goal once here, network
          # allowed; its own output (and any build artifacts it leaves in
          # THIS scratch extraction) is discarded -- the confined capture
          # below always re-extracts a pristine source.tar into its own
          # separate work_dir/source, never this directory, so this
          # priming run is the sole authoritative, captured execution.
          mvn -B test || true

      - name: Trusted setup — pip install pyflakes (editable)
        if: matrix.case.case_id == 'repo-pyflakes'
        working-directory: ${{ runner.temp }}/source-artifact/${{ matrix.case.case_id }}/source
        run: |
          python3 -m venv "$RUNNER_TEMP/venv-${{ matrix.case.case_id }}"
          "$RUNNER_TEMP/venv-${{ matrix.case.case_id }}/bin/pip" install --quiet .

      - name: Trusted setup — pip install requests dev requirements (repo's own documented dev-install path)
        if: matrix.case.case_id == 'repo-requests'
        working-directory: ${{ runner.temp }}/source-artifact/${{ matrix.case.case_id }}/source
        run: |
          python3 -m venv "$RUNNER_TEMP/venv-${{ matrix.case.case_id }}"
          "$RUNNER_TEMP/venv-${{ matrix.case.case_id }}/bin/pip" install --quiet -r requirements-dev.txt

      - name: Trusted setup — gradle wrapper distribution fetch (JDK 21)
        if: matrix.case.ecosystem == 'jvm-gradle'
        working-directory: ${{ runner.temp }}/source-artifact/${{ matrix.case.case_id }}/source
        env:
          JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
        run: ./gradlew --version

      - name: Run the D1b generic capture (${{ matrix.job }})
        run: |
          mkdir -p "$RUNNER_TEMP/work-${{ matrix.case.case_id }}-${{ matrix.job }}" "$RUNNER_TEMP/out-${{ matrix.case.case_id }}-${{ matrix.job }}"
          published_lockfile_arg=()
          if [ "${{ matrix.case.case_id }}" = "repo-dockerfile-parser-rs" ]; then
            published_lockfile_arg=(--published-lockfile "$RUNNER_TEMP/dfpr-published-lockfile/Cargo.lock")
          fi
          python3 qodec/evals/interop/v2/n2/d1-identity-lock/tools/run_pilot_case.py \
            --case-id "${{ matrix.case.case_id }}" \
            --ecosystem "${{ matrix.case.ecosystem }}" \
            --job-name "${{ matrix.job }}" \
            --source-artifact-dir "$RUNNER_TEMP/source-artifact/${{ matrix.case.case_id }}" \
            --work-dir "$RUNNER_TEMP/work-${{ matrix.case.case_id }}-${{ matrix.job }}" \
            --out-dir "$RUNNER_TEMP/out-${{ matrix.case.case_id }}-${{ matrix.job }}" \
            --sandboy-bin "$GITHUB_WORKSPACE/own-net/sandboy/target/release/sandboy" \
            --sandboy-commit-sha "$SANDBOY_COMMIT_SHA" \
            --errata-path qodec/evals/interop/v2/n2/d1-identity-lock/execution-plan-errata.json \
            --venv-python "$RUNNER_TEMP/venv-${{ matrix.case.case_id }}/bin/python" \
            --java-home-11 /usr/lib/jvm/java-11-openjdk-amd64 \
            --java-home-21 /usr/lib/jvm/java-21-openjdk-amd64 \
            "${published_lockfile_arg[@]}"

      - name: Upload n2d1b-pilot-${{ matrix.case.case_id }}-${{ matrix.job }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: n2d1b-pilot-${{ matrix.case.case_id }}-${{ matrix.job }}
          path: ${{ runner.temp }}/out-${{ matrix.case.case_id }}-${{ matrix.job }}
          if-no-files-found: warn
          retention-days: 90
