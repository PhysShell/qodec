name: qodec-n2e-tokio-probe

# Focused, NETWORK-ENABLED diagnostic (not a measurement): reproduces the tokio-4384
# publisher `--locked` install faithfully and captures recipe-consistency evidence
# (parts A-D). Manual-only; the disposable trigger branch (ci-trigger/n2e-tokio-probe-
# <shortI>) carries an ADDITIVE push stanza, and every job checks out the implementation
# commit I = HEAD~1 explicitly.
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'ci-trigger/n2e-tokio-probe-**'

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  N2E: evals/interop/v2/n2/e-rtk-native-corpus

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      impl: ${{ steps.i.outputs.impl }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: i
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q 'ci-trigger/'; then
            impl="$(git rev-parse HEAD~1)"
          else
            impl="${{ github.sha }}"
          fi
          echo "impl=$impl" >> "$GITHUB_OUTPUT"
          echo "implementation commit I = $impl"

  probe:
    runs-on: ubuntu-24.04
    needs: [resolve]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install the EXACT pinned Rust 1.83.0 (publisher toolchain)
        run: |
          rustup toolchain install 1.83.0 --profile minimal --no-self-update
          rustup default 1.83.0
          echo "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" >> "$GITHUB_ENV"
          rustc +1.83.0 --version | grep -q "1.83.0"
      - name: Run the tokio-4384 publisher-recipe consistency probe (network-enabled)
        run: |
          cd "$N2E"
          python3 tools/probe_tokio_recipe_consistency.py
          echo "=== classification_input ==="
          python3 -c "import json;d=json.load(open('tokio-4384-publisher-recipe-consistency-v1.json'));print(json.dumps(d['classification_input'],indent=2));print('lock diff:',json.dumps(d['part_c_disposable_lock_diff']['structured_lock_diff'],indent=2)[:2000])"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        if: always()
        with:
          name: tokio-recipe-consistency
          path: ${{ env.N2E }}/tokio-4384-publisher-recipe-consistency-v1.json
          if-no-files-found: error
          retention-days: 30
