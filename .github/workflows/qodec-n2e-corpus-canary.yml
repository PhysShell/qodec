name: qodec-n2e-corpus-canary

# Manual-only canonical trigger. The disposable trigger branch (ci-trigger/
# n2e-canary-<shortI>) carries an ADDITIVE push stanza (the only difference vs the
# implementation commit I); every job checks out I explicitly, never the trigger
# commit T. Runs the frozen 12-case N2-E acceptance canary: builds and EXPORTS the
# pinned RTK+QODEC Nix closures once, imports them per matrix job, executes each
# case (RAW x3 -> gate -> RTK x3 + o200k + oracle) in its own timeout-tiered job,
# and independently re-derives acceptance from primary evidence.
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'ci-trigger/n2e-canary-**'

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  N2E: evals/interop/v2/n2/e-rtk-native-corpus
  RTK_SHA: "41f316adf7b30a568208a0a4f824bffb266ecb6d01bd9de81bed58e1d469dfcf"

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      impl: ${{ steps.i.outputs.impl }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: i
        name: Resolve implementation commit I (parent of trigger commit T on push)
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q 'ci-trigger/'; then
            impl="$(git rev-parse HEAD~1)"
          else
            impl="${{ github.sha }}"
          fi
          echo "impl=$impl" >> "$GITHUB_OUTPUT"
          echo "implementation commit I = $impl"

  frozen:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Verify frozen Phase A records
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_source_registry.py
          python3 tools/verify_n2e_candidate_inventory.py
          python3 tools/verify_n2e_selection.py
          python3 tools/verify_n2e_command_scenarios.py
      - name: Verify publisher environment registry (re-extract from pinned source + binding)
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_publisher_registry.py
      - name: Verify toolchain lock + scenario correction (self-hash + rebuild parity)
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_toolchain_lock.py --self-hash-only
          python3 tools/build_n2e_scenario_correction.py >/dev/null
          git diff --exit-code n2e-scenario-correction-v1.json || { echo "::error::scenario-correction record is stale (rebuild + commit)"; exit 1; }
      - name: Verify execution contract (offline; correction #3)
        run: |
          cd "$N2E"
          # self-hash + independent per-case re-derivation + _CASE_POLICY agreement
          # (caddy MUST be the case-scoped caddy-go-test-v1, never the family generic;
          # the four SWE-bench test cases derive their publisher-scoped commands).
          python3 tools/verify_n2e_execution_contract.py

  substrate:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true
      - name: Build + export pinned RTK/QODEC closures; assert RTK identity
        run: |
          nix build .#rtk-pinned .#qodec -L --no-update-lock-file
          RTK="$(nix path-info .#rtk-pinned)"
          QODEC="$(nix path-info .#qodec)"
          SHA="$(sha256sum "$RTK/bin/rtk" | cut -d' ' -f1)"
          echo "rtk sha256=$SHA"; test "$SHA" = "$RTK_SHA"
          mkdir -p substrate
          echo "$RTK"   > substrate/rtk.storepath
          echo "$QODEC" > substrate/qodec.storepath
          nix-store --query --requisites "$RTK" "$QODEC" > substrate/closure-paths.txt
          nix-store --export $(cat substrate/closure-paths.txt) | zstd -T0 -19 > substrate/closure.nar.zst
          sha256sum substrate/closure.nar.zst > substrate/closure.nar.zst.sha256
          nix path-info --json --recursive "$RTK" "$QODEC" > substrate/path-info.json
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        with:
          name: substrate
          path: substrate
          if-no-files-found: error
          retention-days: 3

  matrix-gen:
    runs-on: ubuntu-24.04
    needs: [resolve, frozen]
    outputs:
      cases: ${{ steps.gen.outputs.cases }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - id: gen
        run: |
          cases="$(python3 -c "import json;print(json.dumps([m['case_id'] for m in json.load(open('$N2E/n2e-canary-membership-v1.json'))['membership']]))")"
          echo "cases=$cases" >> "$GITHUB_OUTPUT"

  canary:
    runs-on: ubuntu-24.04
    needs: [resolve, substrate, matrix-gen]
    strategy:
      fail-fast: false
      matrix:
        case_id: ${{ fromJson(needs.matrix-gen.outputs.cases) }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      # case-pinned interpreter (BugsInPy scrapy pins CPython 3.8: inspect.getargspec
      # was removed in 3.11, so the frozen pytest cannot import under the 3.11 harness).
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: py_case
        with:
          python-version: "3.8"
      # harness interpreter (last setup-python wins as the default python3)
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: py_harness
        with:
          python-version: "3.11"
      - name: Expose case-pinned interpreters to the driver
        run: |
          printf 'N2E_PY_INTERPRETERS={"3.8":"%s"}\n' "${{ steps.py_case.outputs.python-path }}" >> "$GITHUB_ENV"
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: substrate
          path: substrate
      - name: Import + verify closure identity; prove binaries run
        id: sub
        run: |
          sha="$(cut -d' ' -f1 substrate/closure.nar.zst.sha256)"
          test "$sha" = "$(sha256sum substrate/closure.nar.zst | cut -d' ' -f1)"
          zstd -d -c substrate/closure.nar.zst | nix-store --import
          RTK="$(cat substrate/rtk.storepath)/bin/rtk"
          QODEC="$(cat substrate/qodec.storepath)/bin/qodec"
          test "$(sha256sum "$RTK" | cut -d' ' -f1)" = "$RTK_SHA"
          "$RTK" --version >/dev/null
          "$QODEC" --help >/dev/null
          echo "RTK_BIN=$RTK" >> "$GITHUB_ENV"
          echo "QODEC_BIN=$QODEC" >> "$GITHUB_ENV"
      - name: Toolchains (publisher-pinned; download + SHA-256 verify against the lock)
        run: |
          set -euo pipefail
          cd "$N2E"
          LOCK=n2e-toolchain-lock-v1.json
          getf() { python3 -c "import json,sys;print(json.load(open('$LOCK'))['toolchains']$1)"; }
          # --- Rust 1.83.0 (tokio) ---
          RUST_CH="$(getf "['rust']['channel']")"
          rustup toolchain install "$RUST_CH" --profile minimal --no-self-update
          rustup default "$RUST_CH"
          echo "RUSTUP_HOME=${RUSTUP_HOME:-$HOME/.rustup}" >> "$GITHUB_ENV"
          rustc "+$RUST_CH" --version | tee /dev/stderr | grep -q "$(getf "['rust']['expected_version_contains']")"
          # --- Go 1.23.8 (caddy): download + verify sha256 ---
          GO_URL="$(getf "['go']['artifact']['url']")"; GO_SHA="$(getf "['go']['artifact']['sha256']")"
          curl -fsSL "$GO_URL" -o /tmp/go.tgz
          echo "$GO_SHA  /tmp/go.tgz" | sha256sum -c -
          sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version | grep -q "$(getf "['go']['expected_version_contains']")"
          # --- Node 20.20.2 (vue): download + verify sha256; corepack MUST succeed ---
          NODE_URL="$(getf "['node']['artifact']['url']")"; NODE_SHA="$(getf "['node']['artifact']['sha256']")"
          NODE_NAME="$(getf "['node']['artifact']['name']")"
          curl -fsSL "$NODE_URL" -o /tmp/node.tar.xz
          echo "$NODE_SHA  /tmp/node.tar.xz" | sha256sum -c -
          sudo tar -C /usr/local --strip-components=1 -xJf /tmp/node.tar.xz
          hash -r
          node --version | grep -q "$(getf "['node']['expected_version_contains']")"
          corepack enable   # no '|| true' -- a corepack failure must fail the job
          # --- JDK 21 (lucene) ---
          if [ -n "${JAVA_HOME_21_X64:-}" ]; then
            echo "JAVA_HOME=$JAVA_HOME_21_X64" >> "$GITHUB_ENV"
            echo "$JAVA_HOME_21_X64/bin" >> "$GITHUB_PATH"
            "$JAVA_HOME_21_X64/bin/java" -version 2>&1 | grep -q "$(getf "['java']['expected_version_contains']")"
          fi
      - name: Run canary case (RAW gate -> RTK -> oracle)
        run: |
          cd "$N2E"
          mkdir -p out
          safe="$(python3 -c "import os;print(os.environ['CID'].replace('::','__').replace('/','_'))")"
          python3 tools/run_canary_case.py "$CID" --out "out/n2e-canary-case-$safe.json"
        env:
          CID: ${{ matrix.case_id }}
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        if: always()
        with:
          name: case-${{ strategy.job-index }}
          path: ${{ env.N2E }}/out/*.json
          if-no-files-found: error
          retention-days: 7

  aggregate:
    runs-on: ubuntu-24.04
    needs: [resolve, canary]
    if: always()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: cases
          pattern: case-*
          merge-multiple: true
      - name: Aggregate (primitive re-derivation) + Markdown
        run: |
          cd "$N2E"
          python3 tools/build_n2e_canary_acceptance.py "$GITHUB_WORKSPACE/cases" \
            --run-id "${{ github.run_id }}" --impl-sha "${{ needs.resolve.outputs.impl }}" \
            --trigger-sha "${{ github.sha }}"
          cp n2e-canary-acceptance-v1.json "$GITHUB_WORKSPACE/cases/"
          cat n2e-canary-results-v1.md
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        with:
          name: canary-acceptance
          path: |
            ${{ env.N2E }}/n2e-canary-acceptance-v1.json
            ${{ env.N2E }}/n2e-canary-results-v1.md
          if-no-files-found: error
          retention-days: 30

  accept:
    runs-on: ubuntu-24.04
    needs: [resolve, aggregate]
    if: always()
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: case-*
          path: evidence
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: canary-acceptance
          path: evidence
      - name: Execution-contract runtime checks (correction #2/#3)
        run: |
          cd "$N2E"
          # per-case: effective argv derivable from the frozen contract; no family-
          # generic canon substituted for a required case policy; membership-preserving
          # scheduler flags only; pinned toolchain identity (sha256+version) present;
          # protected-file mutation guard held. Offline gate re-runs first.
          python3 tools/verify_n2e_execution_contract.py "$GITHUB_WORKSPACE/evidence"
      - name: Toolchain-lock runtime verification (exact version equality)
        run: |
          cd "$N2E"
          # every publisher-recipe record's observed toolchain must match the lock
          # exactly (rejects rustc 1.97.1 for 1.83.0, Node 22 for Node 20, ...).
          python3 tools/verify_n2e_toolchain_lock.py "$GITHUB_WORKSPACE/evidence"
      - name: Independent acceptance from primary evidence
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_canary_acceptance.py "$GITHUB_WORKSPACE/evidence"
