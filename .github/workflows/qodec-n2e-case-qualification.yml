name: qodec-n2e-case-qualification

# Generic per-case acceptance vertical for the resolved-twelve (Caddy first). Runs ONE registered
# case adapter through the frozen chain, capturing FRESH RAW/RTK streams. This workflow does NOT
# decide PASS: the probe (probe_case_qualification.py) records OBSERVATIONS ONLY, and the independent
# verifier (verify_case_qualification.py) re-derives the RAW<->RTK equivalence verdict through the
# case's proven dialect. A green job conclusion is NOT the qualification PASS -- the verifier's exit
# code is. No step commits records or flips a promotion flag; the immutable qualification record is
# built + frozen locally afterwards from the downloaded artifact. Manual-only; the disposable trigger
# branch (ci-trigger/n2e-case-qualification-<shortI>) carries an ADDITIVE push stanza and every job
# checks out the implementation commit I = HEAD~1.
on:
  workflow_dispatch:
    inputs:
      case:
        description: "resolved-twelve case id to qualify"
        required: false
        default: "caddyserver__caddy-5870::go::test::buggy"
  push:
    branches:
      - 'ci-trigger/n2e-case-qualification-*'

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  N2E: evals/interop/v2/n2/e-rtk-native-corpus
  RTK_SHA: "41f316adf7b30a568208a0a4f824bffb266ecb6d01bd9de81bed58e1d469dfcf"
  CASE: ${{ github.event.inputs.case || 'gin-gonic__gin-2755::go::vet' }}

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      impl: ${{ steps.i.outputs.impl }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: i
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q 'ci-trigger/'; then
            impl="$(git rev-parse HEAD~1)"
          else
            impl="${{ github.sha }}"
          fi
          echo "impl=$impl" >> "$GITHUB_OUTPUT"
          echo "implementation commit I = $impl"

  verify:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Close the frozen loader closure + verify the manifest + adapter binding
        run: |
          cd "$N2E"
          python3 tools/verify_n2e_resolved_twelve_manifest.py
          python3 - <<'PY'
          import sys, os; sys.path.insert(0, "tools")
          import n2e_resolved_loader as L, n2e_case_adapters as A, n2e_common as c
          L.validate_resolved_closure()
          case = os.environ["CASE"]
          contract = next(e for e in c.load_record(L.CONTRACT)["contracts"] if e["case_id"] == case)
          scenario = next(s for s in c.load_record(L.SCEN)["scenarios"] if s["case_id"] == case)
          det = A.adapter_for(case).bind(contract, scenario)  # double-lock or raise
          print("adapter bound:", det["adapter_id"], det["raw_argv"])
          PY

  substrate:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true
      - name: Build + export pinned RTK/QODEC closures; assert RTK identity
        run: |
          nix build .#rtk-pinned .#qodec -L --no-update-lock-file
          RTK="$(nix path-info .#rtk-pinned)"
          QODEC="$(nix path-info .#qodec)"
          SHA="$(sha256sum "$RTK/bin/rtk" | cut -d' ' -f1)"
          echo "rtk sha256=$SHA"; test "$SHA" = "$RTK_SHA"
          mkdir -p substrate
          echo "$RTK"   > substrate/rtk.storepath
          echo "$QODEC" > substrate/qodec.storepath
          nix-store --query --requisites "$RTK" "$QODEC" > substrate/closure-paths.txt
          nix-store --export $(cat substrate/closure-paths.txt) | zstd -T0 -19 > substrate/closure.nar.zst
          sha256sum substrate/closure.nar.zst > substrate/closure.nar.zst.sha256
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        with:
          name: case-qual-substrate
          path: substrate
          if-no-files-found: error
          retention-days: 3

  qualification:
    runs-on: ubuntu-24.04
    needs: [resolve, verify, substrate]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: case-qual-substrate
          path: substrate
      - name: Import + verify RTK/QODEC closure identity
        run: |
          sha="$(cut -d' ' -f1 substrate/closure.nar.zst.sha256)"
          test "$sha" = "$(sha256sum substrate/closure.nar.zst | cut -d' ' -f1)"
          zstd -d -c substrate/closure.nar.zst | nix-store --import
          RTK="$(cat substrate/rtk.storepath)/bin/rtk"
          QODEC="$(cat substrate/qodec.storepath)/bin/qodec"
          test "$(sha256sum "$RTK" | cut -d' ' -f1)" = "$RTK_SHA"
          "$RTK" --version >/dev/null
          echo "RTK_BIN=$RTK" >> "$GITHUB_ENV"
          echo "QODEC_BIN=$QODEC" >> "$GITHUB_ENV"
      - name: Install the exact locked Go toolchain (caddy)
        run: |
          cd "$N2E"
          LOCK=n2e-toolchain-lock-v1.json
          getf() { python3 -c "import json;print(json.load(open('$LOCK'))['toolchains']$1)"; }
          GO_URL="$(getf "['go']['artifact']['url']")"; GO_SHA="$(getf "['go']['artifact']['sha256']")"
          curl -fsSL "$GO_URL" -o /tmp/go.tgz
          echo "$GO_SHA  /tmp/go.tgz" | sha256sum -c -
          sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tgz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          /usr/local/go/bin/go version | grep -q "$(getf "['go']['expected_version_contains']")"
      # producer records OBSERVATIONS ONLY -> external manifest -> UPLOAD (always) -> verifier GATE
      - name: Run the case acceptance probe (observations only; no verdict)
        run: |
          cd "$N2E"
          mkdir -p out
          python3 tools/probe_case_qualification.py --case "$CASE" \
            --out case-qualification-v1.json \
            --evidence out/evidence/case-qual
          echo "=== outcome ==="
          python3 -c "import json;d=json.load(open('case-qualification-v1.json'));print('outcome=',d.get('outcome'),'qualification_pass=',d.get('qualification_pass'),'raw_det=',(d.get('raw_arm') or {}).get('deterministic'),'rtk_det=',(d.get('rtk_arm') or {}).get('deterministic'))"
      - name: Build EXTERNAL artifact manifest (path/bytes/sha256 of every uploaded file)
        if: always()
        run: |
          cd "$N2E"
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          man_path = Path("out/external-artifact-manifest.json")
          files = [Path("case-qualification-v1.json")]
          for f in sorted(Path("out").rglob("*")):
              if f.is_file() and f != man_path:
                  files.append(f)
          entries = []
          for f in files:
              b = f.read_bytes()
              entries.append({"file": str(f), "bytes": len(b), "sha256": hashlib.sha256(b).hexdigest()})
          man_path.write_text(json.dumps({"count": len(entries), "files": entries}, indent=1, sort_keys=True))
          print("external manifest:", len(entries), "files")
          PY
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        if: always()
        with:
          name: case-qualification
          path: |
            ${{ env.N2E }}/case-qualification-v1.json
            ${{ env.N2E }}/out
          if-no-files-found: error
          retention-days: 30
      - name: Independent case-qualification verifier (GATE; sole PASS authority; runs AFTER upload)
        run: |
          cd "$N2E"
          python3 tools/verify_case_qualification.py \
            case-qualification-v1.json out/evidence/case-qual
