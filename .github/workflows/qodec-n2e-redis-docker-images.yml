name: qodec-n2e-redis-docker-images

# redis::docker::images capture through rtk-docker-images-oracle-v1. TWO modes, selected by the trigger:
#   * diagnostic (BARRED): ci-trigger/n2e-redis-images-diag-*  or dispatch mode=diagnostic
#   * acceptance:          ci-trigger/n2e-redis-images-accept-* or dispatch mode=acceptance
# The daemon is the risk, not the parser. The probe does NOT trust the runner's host Docker as
# authority: it launches TWO isolated, pinned Docker-in-Docker daemons (docker:<pinned>-dind), each
# with a fresh empty --data-root + pinned --storage-driver, provisions each to EXACTLY the pinned
# redis image (pull-by-index-digest), and measures RAW `docker images` on one and RTK `rtk docker
# images` on the other. Records OBSERVATIONS ONLY; the dispatch recompute decides PASS.
# Disposable trigger branch carries an ADDITIVE push commit; every job checks out impl = HEAD~1.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diagnostic (barred) | acceptance"
        type: choice
        options: [diagnostic, acceptance]
        default: diagnostic
      dind_ref:
        description: "pinned Docker-in-Docker image ref (tag for diagnostic; digest for acceptance)"
        default: "docker:27-dind"
  push:
    branches:
      - 'ci-trigger/n2e-redis-images-diag-*'
      - 'ci-trigger/n2e-redis-images-accept-*'

permissions:
  contents: read

env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC
  N2E: evals/interop/v2/n2/e-rtk-native-corpus
  RTK_SHA: "41f316adf7b30a568208a0a4f824bffb266ecb6d01bd9de81bed58e1d469dfcf"
  CASE: "container::redis::docker::images"
  STORAGE_DRIVER: "vfs"

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      impl: ${{ steps.i.outputs.impl }}
      mode: ${{ steps.i.outputs.mode }}
      dind_ref: ${{ steps.i.outputs.dind_ref }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          persist-credentials: false
      - id: i
        run: |
          if [ "${{ github.event_name }}" = "push" ] && echo "${{ github.ref }}" | grep -q 'ci-trigger/'; then
            impl="$(git rev-parse HEAD~1)"
          else
            impl="${{ github.sha }}"
          fi
          if echo "${{ github.ref }}" | grep -q 'redis-images-accept-'; then
            mode="acceptance"
          elif echo "${{ github.ref }}" | grep -q 'redis-images-diag-'; then
            mode="diagnostic"
          else
            mode="${{ github.event.inputs.mode || 'diagnostic' }}"
          fi
          dind="${{ github.event.inputs.dind_ref || 'docker:27-dind' }}"
          echo "impl=$impl" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "dind_ref=$dind" >> "$GITHUB_OUTPUT"
          echo "implementation commit I = $impl ; mode = $mode ; dind = $dind"

  substrate:
    runs-on: ubuntu-24.04
    needs: [resolve]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            sandbox = true
      - name: Build + export pinned RTK/QODEC closures; assert RTK identity
        run: |
          nix build .#rtk-pinned .#qodec -L --no-update-lock-file
          RTK="$(nix path-info .#rtk-pinned)"
          QODEC="$(nix path-info .#qodec)"
          SHA="$(sha256sum "$RTK/bin/rtk" | cut -d' ' -f1)"
          echo "rtk sha256=$SHA"; test "$SHA" = "$RTK_SHA"
          mkdir -p substrate
          echo "$RTK"   > substrate/rtk.storepath
          echo "$QODEC" > substrate/qodec.storepath
          nix-store --query --requisites "$RTK" "$QODEC" > substrate/closure-paths.txt
          nix-store --export $(cat substrate/closure-paths.txt) | zstd -T0 -19 > substrate/closure.nar.zst
          sha256sum substrate/closure.nar.zst > substrate/closure.nar.zst.sha256
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        with:
          name: redis-images-substrate
          path: substrate
          if-no-files-found: error
          retention-days: 3

  capture:
    runs-on: ubuntu-24.04
    needs: [resolve, substrate]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.resolve.outputs.impl }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: redis-images-substrate
          path: substrate
      - name: Docker launcher available (host is a LAUNCHER only, not the authority)
        run: |
          docker version
          docker info --format 'host storage driver: {{.Driver}}'
      - name: Import + verify RTK/QODEC closure identity
        run: |
          sha="$(cut -d' ' -f1 substrate/closure.nar.zst.sha256)"
          test "$sha" = "$(sha256sum substrate/closure.nar.zst | cut -d' ' -f1)"
          zstd -d -c substrate/closure.nar.zst | nix-store --import
          RTK="$(cat substrate/rtk.storepath)/bin/rtk"
          QODEC="$(cat substrate/qodec.storepath)/bin/qodec"
          test "$(sha256sum "$RTK" | cut -d' ' -f1)" = "$RTK_SHA"
          "$RTK" --version >/dev/null
          echo "RTK_BIN=$RTK" >> "$GITHUB_ENV"
          echo "QODEC_BIN=$QODEC" >> "$GITHUB_ENV"
      - name: Run the redis docker images capture (mode=${{ needs.resolve.outputs.mode }})
        env:
          MODE: ${{ needs.resolve.outputs.mode }}
          DIND_REF: ${{ needs.resolve.outputs.dind_ref }}
        run: |
          cd "$N2E"
          mkdir -p out
          python3 tools/probe_redis_docker_images.py --case "$CASE" --mode "$MODE" \
            --dind-ref "$DIND_REF" --storage-driver "$STORAGE_DRIVER" \
            --out redis-docker-images-$MODE-v1.json \
            --evidence out/evidence/redis-docker-images
          echo "=== capture summary (mode=$MODE) ==="
          python3 - "$MODE" <<'PY'
          import json, sys
          mode = sys.argv[1]
          d = json.load(open(f"redis-docker-images-{mode}-v1.json"))
          print("outcome:", d.get("outcome"), "barred:", d.get("barred_from_qualification"))
          dd = d.get("dind_daemon_image") or {}
          print("dind_ref:", dd.get("ref"), "dind_repo_digests:", dd.get("repo_digests"),
                "storage_driver:", dd.get("storage_driver"))
          oo = d.get("oracle_observation") or {}
          print("output_mode:", oo.get("output_mode"))
          print("raw_stdout:", repr((oo.get("raw_stdout_text") or "")[:400]))
          print("rtk_stdout:", repr((oo.get("rtk_stdout_text") or "")[:400]))
          print("raw_format_parsed:", oo.get("raw_format_parsed"))
          print("rtk_parsed:", oo.get("rtk_parsed"))
          print("equivalence:", oo.get("equivalence"))
          for role in ("raw", "rtk"):
              arm = (d.get("arms") or {}).get(role) or {}
              dm = arm.get("daemon") or {}
              print(f"{role} daemon:", {k: dm.get(k) for k in ("storage_driver","data_root","server_version","os_type","arch","images_at_start")})
              print(f"{role} inspect:", arm.get("inspect"))
              print(f"{role} net_denied:", arm.get("network_denied"))
          PY
      - name: Build EXTERNAL artifact manifest (path/bytes/sha256)
        if: always()
        run: |
          cd "$N2E"
          python3 - <<'PY'
          import hashlib, json
          from pathlib import Path
          man = Path("out/external-artifact-manifest.json")
          files = [p for p in Path(".").glob("redis-docker-images-*-v1.json")]
          for f in sorted(Path("out").rglob("*")):
              if f.is_file() and f != man:
                  files.append(f)
          entries = [{"file": str(f), "bytes": len(f.read_bytes()),
                      "sha256": hashlib.sha256(f.read_bytes()).hexdigest()} for f in files]
          man.write_text(json.dumps({"count": len(entries), "files": entries}, indent=1, sort_keys=True))
          print("external manifest:", len(entries), "files")
          PY
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.6.2
        if: always()
        with:
          name: redis-docker-images-${{ needs.resolve.outputs.mode }}
          path: |
            ${{ env.N2E }}/redis-docker-images-*-v1.json
            ${{ env.N2E }}/out
          if-no-files-found: error
          retention-days: 30
