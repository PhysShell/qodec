# Interop Benchmark v2 — Nix-driven CI.
# Deterministic build + contract + smoke checks only. Performs no model calls
# and downloads no model or tokenizer weights during the execution phase.
#
# Third-party actions are pinned to full immutable commit SHAs (never @main /
# @master / a floating tag). The trailing comment records the human-readable
# release for each pin. Verify the SHA against upstream before trusting a pin.
name: qodec-v2

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read-only. No write scopes are granted.
permissions:
  contents: read

# Cancel superseded runs for the same ref (stale PR pushes).
concurrency:
  group: qodec-v2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Contract validator tests (model-free)
        run: nix build .#checks.x86_64-linux.qodec-v2-contract --print-build-logs

  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Build qodec + rtk-pinned and run non-scoring smoke
        run: |
          nix build \
            .#qodec \
            .#rtk-pinned \
            .#checks.x86_64-linux.qodec-rtk-smoke \
            --print-build-logs
      - name: Stage smoke report
        run: |
          mkdir -p smoke-report
          cp -rL result/smoke/. smoke-report/ || true
      - name: Upload smoke report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: qodec-rtk-smoke-report
          path: smoke-report
          if-no-files-found: ignore

  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Full flake check
        # Preserves the existing o7 / clippy / fmt checks alongside the new ones.
        run: nix flake check --print-build-logs
