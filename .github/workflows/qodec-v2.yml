# Interop Benchmark v2 — Nix-driven CI.
# Deterministic build + contract + smoke checks only. Performs no model calls
# and downloads no model or tokenizer weights during the execution phase.
#
# The committed flake.lock is mandatory: every job uses --no-update-lock-file so
# a run FAILS rather than silently relocking if evaluation tries to change it.
#
# Third-party actions are pinned to full immutable commit SHAs (never @main /
# @master / a floating tag). The trailing comment records the human-readable
# release for each pin. Verify the SHA against upstream before trusting a pin.
name: qodec-v2

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read-only. No write scopes are granted.
permissions:
  contents: read

# Cancel superseded runs for the same ref (stale PR pushes).
concurrency:
  group: qodec-v2-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Canonical, fixed execution environment (reproducibility).
env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8
  TZ: UTC

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Contract validator tests (model-free)
        run: nix build .#checks.x86_64-linux.qodec-v2-contract --no-update-lock-file --print-build-logs

  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Build qodec (explicit out-link)
        run: nix build .#qodec --out-link qodec-result --no-update-lock-file --print-build-logs
      - name: Build rtk-pinned (explicit out-link)
        run: nix build .#rtk-pinned --out-link rtk-result --no-update-lock-file --print-build-logs
      - name: Build + run real-RTK smoke (separate derivation)
        run: nix build .#checks.x86_64-linux.qodec-rtk-smoke --out-link smoke-result --no-update-lock-file --print-build-logs
      - name: Stage smoke report
        run: |
          test -f smoke-result/smoke/smoke-report.json
          mkdir -p smoke-report
          cp -rL smoke-result/smoke/. smoke-report/
      - name: Upload smoke report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: qodec-rtk-smoke-report
          path: smoke-report
          if-no-files-found: error

  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - name: Full flake check (committed lock, no relock)
        # Preserves the existing o7 / clippy / fmt checks alongside the new ones.
        run: nix flake check --no-update-lock-file --print-build-logs
